name: Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Analyse avec ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: '.'
